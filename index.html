<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cloudflare Security Lab</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

<h1>☁️ Cloudflare Security Lab</h1>
<p class="subtitle">Full Edge Simulation Dashboard</p>

<div class="grid">

<!-- CHART -->
<div class="card full">
<h2>Live Traffic</h2>
<canvas id="chart"></canvas>
</div>

<!-- CONTROLS -->
<div class="card">
<h2>Traffic</h2>
<button onclick="sendTraffic()">Normal</button>
<button onclick="spamTraffic()">Spike</button>
<button onclick="botTraffic()">Bot</button>
</div>

<div class="card">
<h2>Status Codes</h2>
<button onclick="sendStatus(200)">200</button>
<button onclick="sendStatus(403)">403</button>
<button onclick="sendStatus(404)">404</button>
<button onclick="sendStatus(429)">429</button>
<button onclick="sendStatus(500)">500</button>
</div>

<!-- COUNTER -->
<div class="card">
<h2>Total Requests</h2>
<div id="counter">0</div>
</div>

<!-- STATUS BREAKDOWN -->
<div class="card">
<h2>Status Breakdown</h2>
<pre id="statusBox">Waiting...</pre>
</div>

<!-- COUNTRY -->
<div class="card">
<h2>Country Stats</h2>
<pre id="countryBox">Waiting...</pre>
</div>

<!-- LOGS -->
<div class="card full">
<h2>Activity Logs</h2>
<div id="log">Waiting for requests...</div>
</div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
