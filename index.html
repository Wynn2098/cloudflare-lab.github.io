<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cloudflare Security Lab</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="dashboard">


<h1>☁️ Cloudflare Security Lab</h1>

<p class="subtitle">
Traffic Simulation + Edge Analytics Training
</p>



<div class="grid">


<!-- CHART -->

<div class="card full">

<h2>📊 Live Traffic Analytics</h2>

<canvas id="trafficChart"></canvas>

</div>




<!-- TRAFFIC -->

<div class="card">


<h2>Traffic Generator</h2>


<button onclick="normalTraffic()">
Normal Traffic
</button>


<button onclick="trafficSpike()">
Traffic Spike
</button>


<button onclick="botSimulation()">
Bot Traffic
</button>


</div>






<!-- PROFILE -->

<div class="card">


<h2>Traffic Profiles</h2>


<button onclick="sendRequest('Chrome Windows')">
Chrome Windows
</button>


<button onclick="sendRequest('Safari iOS')">
Safari iOS
</button>


<button onclick="sendRequest('Android')">
Android
</button>


<button onclick="sendRequest('Bot')">
Bot
</button>


</div>






<!-- SECURITY -->

<div class="card">


<h2>Security Testing</h2>


<button onclick="sendStatus(403)">
WAF Block
</button>


<button onclick="sendStatus(429)">
Rate Limit
</button>


<button onclick="sendStatus(404)">
404 Test
</button>


</div>






<!-- STATUS -->

<div class="card">


<h2>Edge Status Simulator</h2>


<div class="status">


<button onclick="sendStatus(200)">
200
</button>


<button onclick="sendStatus(301)">
301
</button>


<button onclick="sendStatus(302)">
302
</button>


<button onclick="sendStatus(403)">
403
</button>


<button onclick="sendStatus(404)">
404
</button>


<button onclick="sendStatus(429)">
429
</button>


<button onclick="sendStatus(500)">
500
</button>


<button onclick="sendStatus(502)">
502
</button>


<button onclick="sendStatus(503)">
503
</button>



</div>


</div>






<!-- COUNTER -->


<div class="card">


<h2>Total Requests</h2>


<div id="counter">

0

</div>


</div>







<!-- LOG -->


<div class="card full">


<h2>Activity Logs</h2>


<div id="log">

Waiting...

</div>


</div>



</div>


</div>


<script src="script.js"></script>


</body>

</html>
