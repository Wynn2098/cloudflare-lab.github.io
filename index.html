<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge Analytics Lab</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="dashboard">

<h1>☁️ Edge Analytics Lab</h1>
<p class="subtitle">Real-time traffic + bot detection simulation</p>

<div class="grid">

<div class="card">
<h2>Controls</h2>
<button onclick="sendEvent('normal')">Normal Traffic</button>
<button onclick="sendEvent('bot')">Bot Traffic</button>
<button onclick="sendEvent('spike')">Traffic Spike</button>
</div>

<div class="card">
<h2>Live Counter</h2>
<div id="counter">0</div>
</div>

<div class="card">
<h2>Bot Rate</h2>
<div id="botRate">0%</div>
</div>

<div class="card full">
<h2>Live Traffic Graph</h2>
<canvas id="chart"></canvas>
</div>

<div class="card full">
<h2>Event Stream</h2>
<div id="log"></div>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
