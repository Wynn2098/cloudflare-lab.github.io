<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Cloudflare Traffic Intelligence Lab</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
  margin: 0;
  padding: 0;
}

.dashboard {
  width: 90%;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

p {
  text-align: center;
  opacity: 0.8;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: #111b2e;
  padding: 20px;
  border-radius: 12px;
}

.card h2 {
  margin-top: 0;
}

button {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  cursor: pointer;
  border: none;
  border-radius: 6px;
  background: #38bdf8;
  color: black;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  background: #0ea5e9;
  transform: scale(1.02);
}

#counter {
  font-size: 48px;
  text-align: center;
  margin: 10px 0;
}

#log {
  background: black;
  padding: 12px;
  min-height: 80px;
  font-size: 14px;
  border-radius: 6px;
  overflow-wrap: break-word;
}

.small-note {
  font-size: 12px;
  opacity: 0.7;
  text-align: center;
}
</style>

</head>

<body>

<div class="dashboard">

<h1>☁️ Cloudflare Traffic Intelligence Lab</h1>

<p>
Simulated traffic generator + Cloudflare analytics learning dashboard
</p>

<div class="grid">

<!-- TRAFFIC PROFILES -->
<div class="card">
<h2>Traffic Profiles</h2>
<button onclick="sendRequest('chrome_win')">Chrome Windows</button>
<button onclick="sendRequest('chrome_mac')">Chrome Mac</button>
<button onclick="sendRequest('safari_ios')">Safari iOS</button>
<button onclick="sendRequest('android')">Android</button>
<button onclick="sendRequest('bot')">Bot Traffic</button>
</div>

<!-- EDGE TESTS -->
<div class="card">
<h2>Edge / Security Tests</h2>
<button onclick="normalTraffic()">Normal Traffic</button>
<button onclick="trafficSpike()">Traffic Spike</button>
<button onclick="errorTest()">404 Test</button>
<button onclick="cacheTest()">Cache Test</button>
<button onclick="wafTest()">WAF Test</button>
<button onclick="rateLimit()">Rate Limit Test</button>
</div>

<!-- LIVE STATS -->
<div class="card">
<h2>Live Counter</h2>
<div id="counter">0</div>

<h2>Activity Log</h2>
<div id="log">Waiting for requests...</div>

<p class="small-note">
Logs are simulated locally. Cloudflare logs appear in dashboard.
</p>
</div>

</div>

</div>

<script>
let count = 0;

/* -----------------------------
   SIMPLE LOG FUNCTION
----------------------------- */
function log(msg) {
  document.getElementById("log").innerText = msg;
}

/* -----------------------------
   COUNTER
----------------------------- */
function inc() {
  count++;
  document.getElementById("counter").innerText = count;
}

/* -----------------------------
   USER AGENT PROFILES (SIMULATION)
----------------------------- */
const agents = {
  chrome_win: "Chrome / Windows UA",
  chrome_mac: "Chrome / macOS UA",
  safari_ios: "Safari / iOS UA",
  android: "Android UA",
  bot: "Cloudflare-Lab-Bot"
};

/* -----------------------------
   PROFILE REQUESTS
----------------------------- */
function sendRequest(type) {
  fetch("/api/" + type, {
    headers: {
      "User-Agent": agents[type] || "default",
      "X-Lab-Type": type
    }
  });

  inc();
  log("Sent profile request: " + type);
}

/* -----------------------------
   NORMAL TRAFFIC
----------------------------- */
function normalTraffic() {
  fetch("/normal");
  inc();
  log("Normal traffic sent");
}

/* -----------------------------
   TRAFFIC SPIKE
----------------------------- */
function trafficSpike() {
  for (let i = 0; i < 100; i++) {
    fetch("/spike");
    inc();
  }
  log("Traffic spike sent (100 requests)");
}

/* -----------------------------
   404 TEST
----------------------------- */
function errorTest() {
  fetch("/this-page-does-not-exist");
  inc();
  log("404 test sent");
}

/* -----------------------------
   CACHE TEST
----------------------------- */
function cacheTest() {
  fetch("/image.jpg?cache=" + Date.now());
  inc();
  log("Cache test sent");
}

/* -----------------------------
   WAF TEST
----------------------------- */
function wafTest() {
  fetch("/admin-panel");
  inc();
  log("WAF test sent (/admin-panel)");
}

/* -----------------------------
   RATE LIMIT TEST
----------------------------- */
function rateLimit() {
  for (let i = 0; i < 20; i++) {
    fetch("/rate-test");
    inc();
  }
  log("Rate limit test sent (20 requests)");
}
</script>

</body>
</html>
