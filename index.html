<!DOCTYPE html>
<html>
<head>
  <title>Cloudflare Traffic Intelligence Lab</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

<h1>☁️ Cloudflare Traffic Intelligence Lab</h1>

<p>Simulate and generate traffic patterns for Cloudflare analytics</p>

<div class="grid">

<!-- Traffic Profiles -->
<div class="card">
<h2>Traffic Profiles</h2>

<button onclick="sendRequest('chrome_win')">Chrome - Windows</button>
<button onclick="sendRequest('chrome_mac')">Chrome - macOS</button>
<button onclick="sendRequest('safari_ios')">Safari - iOS</button>
<button onclick="sendRequest('android')">Android Browser</button>
<button onclick="sendRequest('bot')">Bot UA</button>
</div>

<!-- Edge Simulation -->
<div class="card">
<h2>Edge Behavior Tests</h2>

<button onclick="normal()">Normal Request</button>
<button onclick="spike()">Traffic Spike</button>
<button onclick="errorTest()">Force 404 Test</button>
<button onclick="cacheTest()">Cache Test</button>
</div>

<!-- HTTP Simulation -->
<div class="card">
<h2>HTTP Simulation</h2>

<button onclick="httpTest()">Simulate HTTP Variation</button>
<button onclick="apiTest()">API Traffic</button>

</div>

<!-- Stats -->
<div class="card">
<h2>Live Stats</h2>

<p>Requests Sent:</p>
<h1 id="counter">0</h1>

<p>Last Event:</p>
<div id="log">Waiting...</div>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
