<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloudflare Security Lab</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

<h1>☁️ Cloudflare Security Lab</h1>
<p class="subtitle">Traffic simulation + analytics learning dashboard</p>

<div class="grid">

<!-- TRAFFIC GENERATOR -->
<div class="card">
<h2>Traffic Generator</h2>
<button onclick="normalTraffic()">Normal Request</button>
<button onclick="trafficSpike()">Traffic Spike</button>
<button onclick="botSimulation()">Bot Traffic</button>
</div>

<!-- PROFILE TRAFFIC -->
<div class="card">
<h2>Traffic Profiles</h2>
<button onclick="sendRequest('chrome_win')">Chrome Windows</button>
<button onclick="sendRequest('chrome_mac')">Chrome Mac</button>
<button onclick="sendRequest('safari_ios')">Safari iOS</button>
<button onclick="sendRequest('android')">Android</button>
<button onclick="sendRequest('bot')">Bot Profile</button>
</div>

<!-- SECURITY TESTING -->
<div class="card">
<h2>Security Testing</h2>
<button onclick="wafTest()">WAF Test</button>
<button onclick="rateLimit()">Rate Limit Test</button>
<button onclick="loginAttack()">Fake Login Test</button>
<button onclick="errorTest()">404 Test</button>
<button onclick="cacheTest()">Cache Test</button>
</div>

<!-- LIVE COUNTER -->
<div class="card">
<h2>Live Request Counter</h2>
<div id="counter">0</div>
</div>

<!-- LOG -->
<div class="card full">
<h2>Activity Log</h2>
<div id="log">Waiting...</div>
</div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
